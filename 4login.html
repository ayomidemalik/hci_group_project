<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>THREADSENSE - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com" rel="preconnect"/>
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script id="tailwind-config">

            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary-fixed-dim": "#c6c6c6",
                        "on-surface": "#1b1b1b",
                        "secondary-fixed": "#9ff0fb",
                        "surface-tint": "#5e5e5e",
                        "on-secondary-fixed-variant": "#004f56",
                        "secondary-fixed-dim": "#82d3de",
                        "on-secondary-fixed": "#001f23",
                        "surface-variant": "#e2e2e2",
                        "tertiary-container": "#1b1b1b",
                        "surface-container-low": "#f3f3f3",
                        "surface-container-high": "#e8e8e8",
                        "error-container": "#ffdad6",
                        "outline": "#7e7576",
                        "on-tertiary-fixed": "#1b1b1b",
                        "inverse-surface": "#303030",
                        "primary-container": "#1b1b1b",
                        "on-tertiary": "#ffffff",
                        "surface-bright": "#f9f9f9",
                        "primary": "#000000",
                        "primary-fixed": "#e2e2e2",
                        "tertiary": "#000000",
                        "on-surface-variant": "#4c4546",
                        "on-background": "#1b1b1b",
                        "background": "#f9f9f9",
                        "on-tertiary-container": "#848484",
                        "inverse-on-surface": "#f1f1f1",
                        "tertiary-fixed": "#e2e2e2",
                        "surface-dim": "#dadada",
                        "on-secondary": "#ffffff",
                        "surface": "#f9f9f9",
                        "error": "#ba1a1a",
                        "surface-container-lowest": "#ffffff",
                        "secondary-container": "#9ff0fb",
                        "on-secondary-container": "#066f79",
                        "on-primary": "#ffffff",
                        "inverse-primary": "#c6c6c6",
                        "outline-variant": "#cfc4c5",
                        "surface-container": "#eeeeee",
                        "on-error-container": "#93000a",
                        "on-primary-fixed": "#1b1b1b",
                        "on-primary-container": "#848484",
                        "tertiary-fixed-dim": "#c6c6c6",
                        "on-error": "#ffffff",
                        "on-primary-fixed-variant": "#474747",
                        "secondary": "#006972",
                        "surface-container-highest": "#e2e2e2",
                        "on-tertiary-fixed-variant": "#474747"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "stack-xl": "48px",
                        "margin-mobile": "20px",
                        "gutter-xs": "4px",
                        "gutter-md": "16px",
                        "unit": "8px",
                        "stack-lg": "32px",
                        "gutter-sm": "8px"
                    },
                    "fontFamily": {
                        "headline-sm": ["Inter"],
                        "headline-md": ["Inter"],
                        "body-lg": ["Inter"],
                        "display-lg": ["Inter"],
                        "body-md": ["Inter"],
                        "label-sm": ["Inter"],
                        "label-caps": ["Inter"]
                    },
                    "fontSize": {
                        "headline-sm": ["20px", { "lineHeight": "28px", "fontWeight": "500" }],
                        "headline-md": ["24px", { "lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600" }],
                        "body-lg": ["16px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "display-lg": ["32px", { "lineHeight": "40px", "letterSpacing": "-0.02em", "fontWeight": "600" }],

    <style>
        /* Custom styles to ensure inputs perfectly match the "bottom border only" requirement overriding tailwind forms plugin defaults slightly */
        input[type="email"],
        input[type="password"] {
            box-shadow: none !important;
        }
        /* Adjusted body height for natural flex flow on all devices */
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface antialiased min-h-screen selection:bg-surface-variant selection:text-on-surface">
    <div class="fixed top-4 right-4 z-[9999] flex gap-2">
    <a href="3interactive_onboarding.html" class="bg-surface-container-lowest text-primary border border-outline-variant font-label-caps text-label-caps px-4 py-2 rounded-full shadow-lg hover:bg-surface-container-low hover:shadow-xl transition-all flex items-center gap-1 uppercase tracking-wider backdrop-blur-md bg-opacity-90">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Back
    </a>
    
    <a href="5home_new_arrivals.html" class="bg-primary text-on-primary font-label-caps text-label-caps px-4 py-2 rounded-full shadow-lg hover:bg-surface-tint hover:shadow-xl transition-all flex items-center gap-1 uppercase tracking-wider backdrop-blur-md bg-opacity-90">
        Next 
        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
    </a>
</div>

    <div class="flex min-h-screen w-full">
        
        <!-- Left Column: Form Section -->
        <main class="flex-1 flex flex-col justify-center px-6 sm:px-12 lg:px-24 py-12 w-full lg:w-1/2 xl:w-5/12 bg-surface-container-lowest z-10">
            <div class="max-w-md mx-auto w-full flex flex-col h-full lg:h-auto justify-center">
                
                <!-- Brand / Identity -->
                <div class="w-full mb-stack-xl flex justify-start lg:justify-start">
                    <span class="font-headline-md text-headline-md tracking-tighter font-bold text-primary">THREADSENSE</span>
                </div>

                <!-- Greeting -->
                <div class="mb-stack-xl">
                    <h1 class="font-display-lg text-display-lg text-on-surface">Welcome back,<br/>Samantha.</h1>
                </div>

                <!-- Form Elements -->
                <form action="#" class="flex flex-col gap-stack-lg" method="POST">
                    <div class="flex flex-col gap-gutter-xs">
                        <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="email">Email</label>
                        <input class="w-full border-0 border-b border-outline-variant bg-transparent px-0 py-2 font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-colors rounded-none" id="email" name="email" placeholder="samantha@example.com" required="" type="email"/>
                    </div>

                    <div class="flex flex-col gap-gutter-xs">
                        <div class="flex justify-between items-baseline w-full">
                            <label class="font-label-caps text-label-caps text-on-surface-variant uppercase" for="password">Password</label>
                            <a class="font-body-md text-body-md text-on-surface-variant hover:text-primary transition-colors" href="#">Forgot Password?</a>
                        </div>
                        <input class="w-full border-0 border-b border-outline-variant bg-transparent px-0 py-2 font-body-lg text-body-lg text-on-surface placeholder:text-outline focus:border-primary focus:ring-0 transition-colors rounded-none tracking-widest" id="password" name="password" placeholder="••••••••" required="" type="password"/>
                    </div>

                    <!-- Actions -->
                    <div class="mt-stack-lg flex flex-col gap-gutter-md">
                        <button class="w-full bg-primary text-on-primary font-label-caps text-label-caps py-4 rounded-lg hover:opacity-80 transition-opacity flex justify-center items-center uppercase" type="submit">
                            Sign In
                        </button>
                        <button class="w-full bg-surface-container-lowest text-on-surface border border-outline-variant font-label-caps text-label-caps py-4 rounded-lg hover:bg-surface-container-low transition-colors flex justify-center items-center gap-gutter-sm uppercase" type="button">
                            <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12c0-5.523-4.477-10-10-10z"></path>
                            </svg>
                            Continue with Apple
                        </button>
                    </div>
                </form>

                <!-- Footer Link -->
                <div class="mt-stack-xl text-center lg:text-left">
                    <span class="font-body-md text-body-md text-on-surface-variant">Don't have an account? </span>
                    <a class="font-body-md text-body-md text-primary font-medium hover:underline transition-all" href="#">Sign Up</a>
                </div>
            </div>
        </main>

        <!-- Right Column: Visual Section (Hidden on Mobile/Tablet) -->
        <aside class="hidden lg:block relative flex-1 w-full lg:w-1/2 xl:w-7/12 bg-surface-container-low overflow-hidden">
            <!-- High-quality placeholder image relating to "threads" or "fashion" -->
            <img src="https://images.unsplash.com/photo-1612423284934-2850a4ea6b0f?q=80&w=2070&auto=format&fit=crop" alt="Abstract threaded fabric" class="absolute inset-0 w-full h-full object-cover object-center" />
            
            <!-- Subtle gradient overlay to ensure the image isn't too harsh -->
            <div class="absolute inset-0 bg-gradient-to-r from-surface-container-lowest/20 to-transparent"></div>
        </aside>

    </div>

</body>
</html>
