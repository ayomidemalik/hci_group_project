            <img alt="" class="hidden md:block absolute inset-0 w-full h-full object-cover blur-3xl opacity-40 scale-110" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD7Tm2tUdofjRrruCOKlR66TnuWtQ1UeGXu_otiSaHO-FoTcnfanQlZm_ukDOfpPAl7bnKMIdRuM6mQXTuTQzrJdkU9JQiAs-QYeq-TtttbnQS5vnntNUD4o_aZ_JqYQNkwEWpg3JFtHyI5FVu-6UibwuybRzOQkIXfvK5UqP948xkcoODlfkcyYZzrKjsIjYX0uwwPxQ1praDd4DKearURPw3DiN5Rz3jy5tfcgQ9OPGIXrSDMnumMhSvkvP0TTZ8URxebnU5mQyM"/>

        </div>

        <!-- Top Controls Overlay -->
        <header class="relative z-20 flex justify-between items-center w-full px-margin-mobile md:px-8 pt-safe md:pt-8 pointer-events-none">
            <button aria-label="Close camera" class="w-10 h-10 flex items-center justify-start text-on-tertiary pointer-events-auto hover:opacity-70 transition-opacity">
                <span class="material-symbols-outlined text-[28px]">close</span>
            </button>
            <button aria-label="Toggle flash" class="w-10 h-10 flex items-center justify-end text-on-tertiary pointer-events-auto hover:opacity-70 transition-opacity">
                <span class="material-symbols-outlined text-[28px]">bolt</span>
            </button>
        </header>

        <!-- Center Framing Guide Container -->
        <div class="flex-1 w-full flex items-center justify-center relative z-10 pointer-events-none px-4">
            <!-- Framing Guide: Tall on mobile, wide on desktop -->
            <div class="w-[280px] h-[360px] md:w-[480px] md:h-[320px] lg:w-[560px] lg:h-[360px] border border-on-tertiary/40 rounded-lg relative transition-all duration-500 ease-in-out">

                    Upload from Photos
