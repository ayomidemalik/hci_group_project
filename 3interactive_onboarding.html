<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col font-sans selection:bg-surface-variant selection:text-primary overflow-x-hidden">
    <div class="fixed top-4 right-4 md:top-6 md:right-6 z-[9999] flex gap-1 bg-white/90 dark:bg-black/90 backdrop-blur-md p-1 rounded-full shadow-md border border-gray-200 dark:border-gray-800">
        <a href="2onboarding_meet_threadsense.html" class="px-3 py-2 rounded-full font-sans text-[10px] leading-none uppercase tracking-widest font-semibold text-black dark:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-all flex items-center gap-1">
            <span class="material-symbols-outlined text-[14px]">arrow_back</span>
            Back
        </a>
        <a href="4login.html" class="px-3 py-2 rounded-full font-sans text-[10px] leading-none uppercase tracking-widest font-semibold bg-black text-white dark:bg-white dark:text-black hover:opacity-80 transition-all flex items-center gap-1 shadow-sm">
            Next

        <!-- Header -->
        <header class="text-center md:text-left z-10 md:col-start-1 md:row-start-1 order-1">
            <h1 class="font-display-lg text-display-lg md:text-[48px] md:leading-[1.1] text-primary">Give it a try.</h1>
        </header>

        <!-- Central Feature (Image) -->
        <div class="relative w-full aspect-[4/5] md:aspect-auto md:h-full min-h-[400px] lg:min-h-[600px] rounded-2xl md:rounded-3xl overflow-hidden bg-surface-container-low border border-surface-container-high z-0 shadow-lg md:shadow-[0_8px_32px_rgba(0,0,0,0.06)] md:col-start-2 md:row-start-1 md:row-span-3 order-2">
            
            <img alt="Close-up of ribbed wool sweater texture" class="absolute inset-0 w-full h-full object-cover object-center" data-alt="A highly detailed, extreme close-up photograph of a premium rib-knit wool sweater." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBuo7EjGcArxcl0KnXsnGOQBW7MwU7xUlrL23C9ay2AD8eshSPrubb1dITWmZzETtFiI-UxcKQZmLiOyodvHm9EL_HjByo9ss9i-6plVfY9PYUXXY9AgrTkt5ZoGCXsFuE3jY3SDcVuPGrToQIhceej4JApHRDnHkjBxlwCnrI4iZ2vJcthnNjKgJNxrLAMsy1A9ZtHZEEu9qzXrBRiA_aD9KC3y5H5NZGVFv-VV6J4dq2ba5OL-VsoqXJQEo5hplCdEndcztasc8"/>
            
            <!-- Haptic Icon Overlay -->
            <div class="absolute bottom-6 right-6 md:bottom-10 md:right-10 flex items-center justify-center">
                <!-- Pulse Rings (Added subtle continuous pulse animation) -->
                <div class="absolute inset-0 rounded-full border-2 border-secondary opacity-20 scale-150 animate-pulse"></div>
                <div class="absolute inset-0 rounded-full border border-secondary opacity-40 scale-125 animate-pulse" style="animation-delay: 200ms;"></div>
                
                <!-- Icon Button -->
                <button aria-label="Feel texture" class="relative bg-surface-container-lowest text-secondary w-16 h-16 md:w-20 md:h-20 rounded-full flex items-center justify-center shadow-lg border border-outline-variant hover:bg-surface-container-low transition-all hover:scale-105 active:scale-95 z-10">
                    <span class="material-symbols-outlined" data-icon="touch_app" data-weight="fill" style="font-variation-settings: 'FILL' 1; font-size: 32px;">touch_app</span>
                </button>
            </div>
        </div>

        <!-- Instructions -->
        <div class="flex flex-col items-center md:items-start text-center md:text-left z-10 md:col-start-1 md:row-start-2 md:self-center order-3 mt-2 md:mt-0">
