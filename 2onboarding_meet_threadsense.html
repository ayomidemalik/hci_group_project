<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col font-body-md selection:bg-secondary selection:text-on-secondary antialiased relative overflow-y-auto overflow-x-hidden">
    <div class="fixed top-4 left-4 md:top-8 md:left-8 z-[9999] flex gap-1 bg-white/90 dark:bg-black/90 backdrop-blur-md p-1 rounded-full shadow-md border border-gray-200 dark:border-gray-800">
        <a href="index.html" class="px-4 py-2 rounded-full font-sans text-[10px] leading-none uppercase tracking-widest font-semibold text-black dark:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-all flex items-center gap-1">
            <span class="material-symbols-outlined text-[16px]">arrow_back</span>
            Back
        </a>
        <a href="3interactive_onboarding.html" class="px-4 py-2 rounded-full font-sans text-[10px] leading-none uppercase tracking-widest font-semibold bg-black text-white dark:bg-white dark:text-black hover:opacity-80 transition-all flex items-center gap-1 shadow-sm">
            Next 
            <span class="material-symbols-outlined text-[16px]">arrow_forward</span>
        </a>
    </div>

    <!-- Top Action Bar (Absolute positioned to stay out of the center flow on large screens) -->
    <header class="absolute top-0 left-0 right-0 w-full max-w-7xl mx-auto px-6 py-6 flex justify-end items-center z-20">
        <button class="font-body-md text-on-surface-variant hover:text-on-surface transition-colors duration-200">Skip</button>
    </header>

    <!-- Main Content Area Wrapper -->
    <main class="flex-grow flex items-center justify-center w-full px-6 py-20 lg:py-12 z-10">
        
        <!-- Two-Column Grid for Desktop / Stacked for Mobile -->
        <div class="flex flex-col lg:flex-row items-center justify-center max-w-6xl w-full gap-10 lg:gap-20">
            
            <!-- Left Side: Illustration Area -->
            <div class="relative w-full aspect-square max-w-[320px] md:max-w-[400px] lg:max-w-[500px] flex items-center justify-center shrink-0">
                <!-- Background Decoration / Halo -->
                <div class="absolute inset-0 bg-surface-container-low rounded-full blur-3xl opacity-50 transition-all duration-500 hover:scale-105"></div>
                
                <!-- Core Image -->
                <img class="relative z-10 w-full h-full object-cover rounded-full shadow-sm" alt="A high-fashion, minimalistic vector illustration of a person holding a smartphone. Abstract, smooth waves in a soft deep teal accent color radiate from the phone screen to their fingers." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxEx4WMRoFJC-2BmTKxgGXyX__Y9R5ZhJdRGSCP4VkQT6CLg0IK9FXYRsik24b29Gytl3fpR41rLRV5w4kFnK8tsiXVXvftqbqQT0VizJMlNfS6uMWjX2LVaWUkIYCpKlF3QMl9x8hTpjNbEJkNbjcdnHKW1MZQPjxJkMUTETdqz1OEI5YErIWqHg2nKEdF3bts-_nOO16BXGDYkRrw_E0JhyEh07Xlg6s1ca3TBWJWV4PaZdpQlaVGLhh4nwhN0Flgi_H8_VsT-U"/>
                
                <!-- Abstract Haptic Waves -->
                <div class="absolute z-20 w-full h-full pointer-events-none flex items-center justify-center">
                    <div class="w-3/4 h-3/4 border-2 border-secondary/30 rounded-full absolute animate-pulse"></div>
                    <div class="w-1/2 h-1/2 border-2 border-secondary/50 rounded-full absolute animate-pulse" style="animation-delay: 500ms;"></div>
                </div>
            </div>

            <!-- Right Side: Typography and Actions -->
            <div class="flex flex-col items-center lg:items-start text-center lg:text-left max-w-md lg:max-w-lg w-full">
                
                <h1 class="font-display-lg text-4xl md:text-5xl lg:text-6xl text-primary mb-4 lg:mb-6 tracking-tight leading-tight">
                    Meet THREADSENSE
                </h1>
                
                <p class="font-body-lg text-base md:text-lg text-on-surface-variant mb-10 lg:mb-14 leading-relaxed">
                    Experience fashion through touch. Browse, shop, and feel the texture of fabrics directly through your screen.
                </p>

                <!-- Progress Indicators -->
                <div class="flex space-x-3 mb-8 lg:mb-12">
                    <div class="w-2.5 h-2.5 rounded-full bg-primary transition-all duration-300"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-tertiary-fixed-dim transition-all duration-300 hover:bg-outline-variant cursor-pointer"></div>
                    <div class="w-2.5 h-2.5 rounded-full bg-tertiary-fixed-dim transition-all duration-300 hover:bg-outline-variant cursor-pointer"></div>
                </div>

                <!-- Primary Action Button -->
                <button class="w-full lg:w-auto lg:px-16 bg-primary text-on-primary font-body-lg text-body-lg py-4 rounded-lg flex items-center justify-center hover:bg-inverse-surface hover:scale-[1.02] transition-all duration-200 shadow-md">
                    Next
                </button>
            </div>

        </div>
    </main>

</body>
</html>
