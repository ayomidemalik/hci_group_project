    </a>
</div>
    <!-- Main Content Canvas -->

                    check_circle
                </span>
            </div>

            <!-- Typographic Lockup -->
            <div class="space-y-unit md:space-y-3">
                <h1 class="font-display-lg text-display-lg md:text-4xl text-primary tracking-tight">Order Confirmed!</h1>
                <p class="font-body-lg text-body-lg md:text-lg text-on-surface-variant">Thank you for your purchase, Ngozi.</p>
                <p class="font-body-md text-body-md md:text-base text-on-surface-variant pt-unit md:pt-2">Order #TS-82910</p>
            </div>

                <button class="w-full md:flex-1 bg-primary text-on-primary font-label-caps text-label-caps py-4 rounded-lg hover:opacity-90 transition-opacity whitespace-nowrap">
                    Track Order
                </button>
                <button class="w-full md:flex-1 bg-transparent text-primary border border-outline-variant font-label-caps text-label-caps py-4 rounded-lg hover:bg-surface-container transition-colors whitespace-nowrap">
                    Continue Shopping
                </button>
            </div>
