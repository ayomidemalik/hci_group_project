<body class="bg-surface-container-lowest text-on-surface min-h-[100dvh] flex flex-col font-body-md selection:bg-secondary selection:text-on-secondary antialiased overflow-x-hidden relative">
    <div class="fixed top-4 left-4 md:top-8 md:left-8 z-[9999] flex gap-1 bg-white/90 dark:bg-black/90 backdrop-blur-md p-1 rounded-full shadow-md border border-gray-200 dark:border-gray-800">
        <a href="8product_detail.html" class="px-3 py-2 rounded-full font-sans text-[10px] leading-none uppercase tracking-widest font-semibold text-black dark:text-white hover:bg-gray-100 dark:hover:bg-gray-800 transition-all flex items-center gap-1">

        <a href="10AR_Garment_Preview.html" class="px-3 py-2 rounded-full font-sans text-[10px] leading-none uppercase tracking-widest font-semibold bg-black text-white dark:bg-white dark:text-black hover:opacity-80 transition-all flex items-center gap-1 shadow-sm">
            Next

        </a>

    <!-- Absolute Top Action Bar (Skip Button) -->

        <button class="font-body-md text-on-surface-variant hover:text-on-surface transition-colors duration-200">Skip</button>

        <!-- Left: Illustration Area -->
        <div class="relative w-full aspect-square max-w-[320px] lg:max-w-[480px] flex-shrink-0 flex items-center justify-center mb-auto lg:mb-0 mt-8 lg:mt-0">
            <!-- Background Decoration / Halo -->
            <div class="absolute inset-0 bg-surface-container-low rounded-full blur-3xl opacity-50"></div>
            
            <!-- Core Image -->
            <img class="relative z-10 w-full h-full object-cover rounded-full shadow-sm blur-[2px]" data-alt="A high-fashion, minimalistic vector illustration of a person holding a smartphone. Abstract, smooth waves in a soft deep teal accent color radiate from the phone screen to their fingers, representing haptic touch. The overall aesthetic is pure white, luxurious, and clean." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBxEx4WMRoFJC-2BmTKxgGXyX__Y9R5ZhJdRGSCP4VkQT6CLg0IK9FXYRsik24b29Gytl3fpR41rLRV5w4kFnK8tsiXVXvftqbqQT0VizJMlNfS6uMWjX2LVaWUkIYCpKlF3QMl9x8hTpjNbEJkNbjcdnHKW1MZQPjxJkMUTETdqz1OEI5YErIWqHg2nKEdF3bts-_nOO16BXGDYkRrw_E0JhyEh07Xlg6s1ca3TBWJWV4PaZdpQlaVGLhh4nwhN0Flgi_H8_VsT-U" alt="ThreadSense Haptic Demo"/>
            
            <div class="absolute inset-0 z-20 flex items-center justify-center pointer-events-none">
                <!-- Focal Point (Clear area) -->
                <div class="w-32 h-32 lg:w-48 lg:h-48 rounded-full border border-white/20 shadow-[0_0_40px_rgba(255,255,255,0.3)] bg-transparent overflow-hidden"></div>
                
                <!-- Concentric Ripple Effect (Scales up on lg breakpoints) -->
                <div class="absolute w-32 h-32 lg:w-48 lg:h-48 rounded-full border-2 border-[#006064] opacity-60 animate-ping"></div>
                <div class="absolute w-40 h-40 lg:w-56 lg:h-56 rounded-full border border-[#006064] opacity-40 animate-[ping_1.5s_linear_infinite]"></div>
                <div class="absolute w-48 h-48 lg:w-64 lg:h-64 rounded-full border border-[#006064] opacity-20 animate-[ping_2s_linear_infinite]"></div>
                
                <!-- Status Overlay Text -->
                <div class="absolute top-[80%] lg:top-[85%] left-1/2 -translate-x-1/2 whitespace-nowrap">
                    <p class="font-headline-sm text-sm lg:text-base text-white drop-shadow-md bg-black/20 px-4 py-1.5 rounded-full backdrop-blur-sm">Feeling the smooth texture...</p>
                </div>
            </div>
        </div>

        <!-- Right: Content & Controls Area -->

                    <div class="w-2 h-2 rounded-full bg-tertiary-fixed-dim"></div>
