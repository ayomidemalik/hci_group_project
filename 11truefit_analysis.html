<body class="bg-background text-on-background min-h-screen relative overflow-hidden font-body-md">
    <div class="fixed top-4 right-4 z-[9999] flex gap-2">
    <a href="10AR_Garment_Preview.html" class="bg-surface-container-lowest text-primary border border-outline-variant font-label-caps text-label-caps px-4 py-2 rounded-full shadow-lg hover:bg-surface-container-low hover:shadow-xl transition-all flex items-center gap-1 uppercase tracking-wider backdrop-blur-md bg-opacity-90">
        <span class="material-symbols-outlined text-[18px]">arrow_back</span>
        Back
    </a>
    
    <a href="12customer_reviews.html" class="bg-primary text-on-primary font-label-caps text-label-caps px-4 py-2 rounded-full shadow-lg hover:bg-surface-tint hover:shadow-xl transition-all flex items-center gap-1 uppercase tracking-wider backdrop-blur-md bg-opacity-90">
        Next 
        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
    </a>
</div>

    <!-- Background Layer (Blurred Product Page Context) -->
    <div class="fixed inset-0 z-0 flex flex-col pointer-events-none filter blur-sm scale-[1.02] transition-all duration-300">
        <!-- Mock TopAppBar -->
        <header class="flex items-center justify-between px-margin-mobile h-16 w-full max-w-6xl mx-auto bg-surface md:bg-transparent border-b md:border-none border-outline-variant">
            <span class="material-symbols-outlined text-primary">menu</span>
            <h1 class="font-display-lg text-display-lg tracking-tighter text-primary">THREADSENSE</h1>
            <span class="material-symbols-outlined text-primary">shopping_bag</span>
        </header>

        <!-- Mock Product Content (Responsive Split Layout) -->
        <main class="flex-1 overflow-hidden w-full max-w-6xl mx-auto md:flex md:gap-12 md:px-margin-mobile md:py-8">
            <!-- Product Image Div -->
            <div class="w-full h-[55vh] md:h-[600px] md:w-1/2 md:rounded-2xl bg-surface-container bg-cover bg-center shadow-sm" 
                 data-alt="A high-fashion editorial photograph of a flowing, pale beige 100% silk dress..." 
                 style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBwfazdrw4XD_LnfAVVggMIDuu3vg5BPVXzP9fKwNe65hgofWWcv2hFyPA8GtMNW1EIkTTxLlfYUqSdV4xG9C6HkhvI_SyXsDcpwrssNgUY6ws8dgTgCeCO6euzn4g29-0dqE27A-BKie9ReV_KXPj76guDlHtw15-br9X95t1AVowXo5EBvpUvGgummze5CfYv-GAO6Cgn2QNaFAP3sALMw7WzK6zePvJjpdkzqVMXEkTdgGYNWdkyv2M1zEV_5Gkgsw4l9g_PhU4');">
            </div>
            
            <!-- Product Details Skeleton Content -->
            <div class="px-margin-mobile py-stack-lg md:w-1/2 md:p-0 md:flex md:flex-col md:justify-center">
                <div class="h-6 w-2/3 bg-surface-variant rounded mb-gutter-xs"></div>
                <div class="h-4 w-1/3 bg-surface-variant rounded mb-stack-lg"></div>
                <div class="h-12 w-full bg-surface-variant rounded-lg"></div>
                <div class="h-12 w-full bg-surface-variant rounded-lg mt-gutter-md hidden md:block"></div>
                <div class="h-32 w-full bg-surface-variant rounded-lg mt-gutter-md hidden md:block"></div>
            </div>
        </main>
    </div>

    <!-- Modal Scrim Overlay -->
    <div class="fixed inset-0 bg-primary/40 backdrop-blur-[3px] z-40 transition-opacity"></div>

    <!-- Responsive Modal (Bottom Sheet on Mobile -> Centered Dialog on Desktop) -->
    <section class="fixed bottom-0 left-0 right-0 w-full md:w-[480px] md:left-1/2 md:top-1/2 md:bottom-auto bg-surface-container-lowest rounded-t-xl md:rounded-2xl z-50 flex flex-col shadow-[0_-10px_40px_rgba(0,0,0,0.05)] md:shadow-2xl transform transition-transform duration-300 translate-y-0 md:-translate-x-1/2 md:-translate-y-1/2 pb-safe md:pb-0 overflow-hidden">
        
        <!-- Drag Handle Indicator (Mobile Only) -->
        <div class="w-full flex justify-center pt-gutter-sm pb-gutter-md pointer-events-none md:hidden">
            <div class="w-10 h-1 bg-surface-variant rounded-full"></div>
        </div>

        <!-- Modal Header -->
        <header class="flex items-center justify-between px-margin-mobile pb-gutter-md md:pt-stack-lg border-b border-surface-container">
            <h2 class="font-headline-sm text-headline-sm text-on-surface">TrueFit Analysis</h2>
            <button aria-label="Close modal" class="p-1 -mr-1 rounded-full text-on-surface-variant hover:bg-surface-container-low transition-colors">
                <span class="material-symbols-outlined block">close</span>
            </button>
        </header>

        <!-- Modal Content -->
        <div class="px-margin-mobile py-stack-lg flex-1 overflow-y-auto">
            <!-- Progress Bar Section -->
            <div class="mb-stack-lg">
                <div class="flex justify-between items-end mb-gutter-sm">
                    <span class="font-label-caps text-label-caps text-on-surface-variant uppercase tracking-widest">Match</span>
                    <span class="font-headline-md text-headline-md text-primary leading-none">94%</span>
                </div>
                <!-- Track -->
                <div class="h-1.5 w-full bg-surface-container rounded-full overflow-hidden">
                    <!-- Fill -->
                    <div class="h-full bg-primary w-[94%] rounded-full transition-all duration-1000 ease-out"></div>
                </div>
            </div>

            <!-- Recommendation Text -->
            <p class="font-body-lg text-body-lg text-on-surface leading-relaxed mb-stack-lg">
                Based on your previous purchases and the 100% silk composition, we recommend size <span class="font-bold text-primary">Medium</span>. This fabric has zero stretch.
            </p>

            <!-- Supporting Data (Bento-style Minimal Cards) -->
            <div class="grid grid-cols-2 gap-gutter-md">
                <div class="border border-surface-variant rounded-lg p-gutter-md flex flex-col items-start bg-surface-bright">
                    <span class="material-symbols-outlined text-secondary mb-gutter-sm" style="font-variation-settings: 'FILL' 1;">straighten</span>
                    <span class="font-label-sm text-label-sm text-on-surface-variant mb-1">Fit Profile</span>
                    <span class="font-body-md text-body-md text-on-surface font-medium">True to Size</span>
                </div>
                <div class="border border-surface-variant rounded-lg p-gutter-md flex flex-col items-start bg-surface-bright">
                    <span class="material-symbols-outlined text-secondary mb-gutter-sm">texture</span>
                    <span class="font-label-sm text-label-sm text-on-surface-variant mb-1">Fabric Stretch</span>
                    <span class="font-body-md text-body-md text-on-surface font-medium">Zero Stretch</span>
                </div>
            </div>
        </div>

        <!-- Modal Footer (Action) -->
        <footer class="px-margin-mobile pt-gutter-md pb-gutter-md md:pb-stack-lg mt-auto border-t border-surface-container bg-surface-container-lowest">
            <button class="w-full h-14 bg-primary text-on-primary rounded-lg font-body-lg text-body-lg font-semibold flex items-center justify-center gap-gutter-sm hover:bg-on-surface transition-colors active:scale-[0.98] shadow-sm">
                <span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">shopping_bag</span>
                Add Size M to Bag
            </button>
        </footer>
    </section>

</body>
</html>
